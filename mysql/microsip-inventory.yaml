# -----------------------------------------------------------------------------
# Verification commands (informational; for use by clients and auditors)
# -----------------------------------------------------------------------------
verification_commands:
  list_marker_comment_in_routines: |
    SELECT ROUTINE_SCHEMA, ROUTINE_NAME, ROUTINE_TYPE, ROUTINE_COMMENT
    FROM INFORMATION_SCHEMA.ROUTINES
    WHERE ROUTINE_COMMENT LIKE '%Factor BI Licensed Component%';
  list_marker_comment_in_events: |
    SELECT EVENT_SCHEMA, EVENT_NAME, EVENT_COMMENT
    FROM INFORMATION_SCHEMA.EVENTS
    WHERE EVENT_COMMENT LIKE '%Factor BI Licensed Component%';
  inspect_object_definition:
    - "SHOW CREATE PROCEDURE <schema>.<name>;"
    - "SHOW CREATE FUNCTION  <schema>.<name>;"
    - "SHOW CREATE VIEW      <schema>.<name>;"
    - "SHOW CREATE EVENT     <schema>.<name>;"

