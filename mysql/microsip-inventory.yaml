# =============================================================================
# Factor BI — MySQL Routines Inventory (Microsip)
# =============================================================================
# This file lists every MySQL object (PROCEDURE, FUNCTION, VIEW, EVENT)
# that Factor BI develops, deploys or maintains as part of its Platform
# for the Microsip source system.
#
# Companion document: ./README.md (human-readable description of the
# six functional families that span all source systems).
#
# In case of interpretive discrepancy between this file and Annex B of
# the DLA, the DLA prevails.
#
# Document conventions:
#   - YAML keys are in English (industry convention for machine-readable data).
#   - YAML values are in Spanish (the canonical language of the DLA).
#   - Stable IDs (e.g. FAM-01) survive renames and translations.
# =============================================================================

catalog_metadata:
  product_name: "Factor BI Plataforma de Dashboards"
  asset_domain: "MySQL"
  source_system: "Microsip"
  licensor:
    legal_name: "PANEL CRUNCH DATA ANALYTICS, S.A. DE C.V."
    rfc: "PCD190724QD9"
    brand: "Factor BI"
  dla_reference:
    annex: "B"
    section: "1"
  catalog_inception_date: "2026-05-19"
  catalog_url: "https://github.com/factorbi/dla-catalog"
  language:
    keys: "en"
    values: "es"

# -----------------------------------------------------------------------------
# Object types covered by the DLA
# -----------------------------------------------------------------------------
object_types:
  covered:
    - id: "PROCEDURE"
      count: 105
    - id: "FUNCTION"
      count: 21
    - id: "VIEW"
      count: 91
    - id: "EVENT"
      count: 2
  total_objects: 219

# -----------------------------------------------------------------------------
# Embedded marker specification (criterion 1.C of Annex B)
# -----------------------------------------------------------------------------
embedded_marker:
  comment_text: "Factor BI Licensed Component"
  inline_sql_legend: "Factor BI Licensed Component | PANEL CRUNCH DATA ANALYTICS S.A. DE C.V. | DLA | https://github.com/factorbi/dla-catalog"
  marker_location_by_object_type:
    PROCEDURE:
      comment_attribute_query: "INFORMATION_SCHEMA.ROUTINES.ROUTINE_COMMENT"
      inline_marker_visible_via: "SHOW CREATE PROCEDURE"
    FUNCTION:
      comment_attribute_query: "INFORMATION_SCHEMA.ROUTINES.ROUTINE_COMMENT"
      inline_marker_visible_via: "SHOW CREATE FUNCTION"
    EVENT:
      comment_attribute_query: "INFORMATION_SCHEMA.EVENTS.EVENT_COMMENT"
      inline_marker_visible_via: "SHOW CREATE EVENT"
    VIEW:
      comment_attribute_query: null  # MySQL does not support COMMENT on VIEWs
      inline_marker_visible_via: null  # MySQL does not preserve inline comments inside VIEW bodies once deployed
      note: "Para VIEWs, los marcadores embebidos sólo subsisten en el código fuente versionado por el Licenciante. La identificación se apoya prioritariamente en los criterios 1.A y 1.B."
  absence_clause: "La ausencia o remoción del marcador no excluye el carácter de Rutina MySQL Licenciada si el objeto se identifica conforme a los criterios 1.A, 1.B o 1.D del Anexo B."

# -----------------------------------------------------------------------------
# Identification criteria (criteria 1.A through 1.D of Annex B)
# -----------------------------------------------------------------------------
identification_criteria:
  - id: "1.A"
    name: "Inclusión en el Catálogo Público"
    description: "El objeto, identificado por su nombre exacto, aparece en la sección 'objects' de este archivo (o en el commit history del repositorio Git, posterior al 19 de mayo de 2026)."
  - id: "1.B"
    name: "Pertenencia a una familia funcional"
    description: "El objeto pertenece, por su propósito y comportamiento, a alguna de las familias funcionales enumeradas en la sección 'families' de este archivo."
  - id: "1.C"
    name: "Marcadores Embebidos"
    description: "El objeto contiene el marcador embebido descrito en la sección 'embedded_marker' de este archivo."
  - id: "1.D"
    name: "Reconocimiento como objeto preexistente"
    description: "El objeto fue capturado en el inventario inicial a la fecha de firma del Anexo A correspondiente, conforme al criterio 1.D del Anexo B del DLA."

# -----------------------------------------------------------------------------
# Functional families (criterion 1.B of Annex B)
# Same families apply to all Source Systems; see ./README.md for full
# description.
# -----------------------------------------------------------------------------
families:
  - id: "FAM-01"
    name: "Utilitarios de Esquema"
    description: "Procedimientos auxiliares para manipulación dinámica de la estructura del esquema (creación, alteración y eliminación de tablas, columnas, índices y llaves primarias; renombrados; operaciones de adaptación multi-tenant)."
    transversal_to_source_systems: true
    object_count_in_this_inventory: 11
  - id: "FAM-02"
    name: "Dimensiones de Tiempo"
    description: "Procedimientos y funciones de generación de calendarios y dimensiones de tiempo, navegación temporal, cálculos de aging por fecha, year-month, year-to-date y agrupaciones equivalentes."
    transversal_to_source_systems: true
    object_count_in_this_inventory: 17
  - id: "FAM-03"
    name: "DWH (Data Warehouse)"
    description: "Procedimientos, vistas, funciones y eventos asociados a la ingestión, transformación, carga, post-procesamiento, consolidación multi-empresa, tratamiento fiscal y cálculo de indicadores de negocio dentro del Almacén de Datos construido en MySQL, alimentado desde el Sistema de Origen."
    transversal_to_source_systems: false
    object_count_in_this_inventory: 182
  - id: "FAM-04"
    name: "Funciones Auxiliares"
    description: "Funciones de manipulación de cadenas y números, extracción de JSON, cálculos de tipo de cambio y utilidades de propósito general aplicables a cualquier Sistema de Origen."
    transversal_to_source_systems: true
    object_count_in_this_inventory: 6
  - id: "FAM-05"
    name: "Instalación y Eventos Programados"
    description: "Procedimientos y eventos asociados a la instalación inicial del esquema y a tareas de mantenimiento programado."
    transversal_to_source_systems: true
    object_count_in_this_inventory: 2
  - id: "FAM-06"
    name: "Otros Utilitarios"
    description: "Procedimientos de propósito general utilizados internamente por las demás familias (control de flujo, depuración, registro de actividad y similares)."
    transversal_to_source_systems: true
    object_count_in_this_inventory: 1

